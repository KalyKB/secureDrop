name: Encrypt Database

on:
  workflow_dispatch:  # Lets you run it manually

jobs:
  encrypt:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the files from your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install OpenSSL (needed to encrypt)
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y openssl

      # Step 3: Encrypt the database
      - name: Encrypt database
        run: |
          openssl enc -aes-256-cbc -salt \
          -in secureDrop-main.zip \
          -out secureDrop-main.zip.enc \
          -pass pass:${{ secrets.DB_KEY }}

      # Step 4: Commit encrypted file
      - name: Commit encrypted file
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Add encrypted database
          branch: main
          file_pattern: secureDrop-main.zip.enc
          commit_user_name: github-actions
          commit_user_email: actions@github.com
