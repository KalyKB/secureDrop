name: Encrypt Database

on:
  workflow_dispatch:

jobs:
  encrypt:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install OpenSSL
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y openssl

      # Step 3: Encrypt the database ZIP
      - name: Encrypt database
        run: |
          openssl enc -aes-256-cbc -salt \
          -in secureDrop-main.zip \
          -out secureDrop-main.zip.enc \
          -pass pass:${{ secrets.DB_KEY }}

      # Step 4: Commit and push encrypted file using PAT
      - name: Commit and push encrypted file
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add secureDrop-main.zip.enc
        git commit -m "Add encrypted database" || echo "No changes to commit"
        git push https://${{ secrets.PAT_TOKEN }}@github.com/Tagg02/secureDrop.git HEAD:main
