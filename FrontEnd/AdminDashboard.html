<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VaultCloud - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="dashboard-page">

  <header class="dashboard-navbar">
    <div class="logo">
      <img src="logo.png" alt="VaultCloud Logo" />
    </div>

    <h1>Admin Dashboard</h1>

    <a class="role-button" href="Dashboard.html">User Dashboard</a>

    <button id="logout-button" class="logout-button">Logout</button>
  </header>

  <main class="dashboard-content">

    <h2>Admin Control Panel</h2>

    <section class="upload-section">
      <button class="upload-button" id="view-users-btn">
        👥 View All Users
      </button>

      <button class="upload-button" id="view-files-btn">
        📂 View All Files
      </button>
    </section>

    <section class="files-section">
      <h2>System Data</h2>

      <div class="file-table-wrapper">
        <table class="file-table">
          <thead>
            <tr id="table-headers">
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <!-- Admin data loads here -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
