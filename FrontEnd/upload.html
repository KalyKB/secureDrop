<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VaultCloud - Upload</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="upload-page">
    <header class="dashboard-navbar">
      <div class="logo" id="logo-link">
        <img src="logo.png" alt="VaultCloud Logo" />
      </div>
      <h1>Upload File</h1>
      <button id="logout-button" class="logout-button">Logout</button>
    </header>

    <main class="upload-content">
      <div class="upload-card">
        <h2>Select a file to upload</h2>

        <div class="drop-area" id="drop-area">
          <p>Drag & Drop your file here</p>
          <p>
            or
            <a href="#" id="browse-link">Browse files</a>
          </p>

          <input type="file" id="file-input" hidden />
        </div>

        <p id="file-name"></p>

        <button class="upload-button" id="upload-button">Upload</button>
        <button class="cancel-button" id="cancel-button">Cancel</button>
      </div>
    </main>

    <script src="upload.js"></script>
  </body>
</html>
